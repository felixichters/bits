name: Run unit tests

on:
  push: {}
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build setuptools wheel

      - name: Install package
        run: |
          pip install -e .

      - name: Run unit tests
        run: pytest -q

